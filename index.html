<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RXG INDOMINUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      color: #ffffff; 
      min-height: 100vh;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      overflow-x: hidden;
      background-color: #030303; 
      position: relative;
    }

    /* CANVAS DE RAYOS */
    #canvasRayos {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none; 
    }

    /* PANTALLAS (GLASSMORPHISM) */
    .pantalla {
      text-align: center; 
      position: absolute; 
      width: 90%; 
      max-width: 550px; 
      padding: 35px 25px;
      background: rgba(10, 10, 10, 0.82); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(223, 183, 108, 0.2); 
      border-radius: 12px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2; 
    }
    .oculto { opacity: 0; transform: translateY(-30px) scale(0.95); pointer-events: none; visibility: hidden; }
    
    /* TÍTULO PRINCIPAL */
    h1 {
      font-size: 2.4rem; font-weight: 600; letter-spacing: 8px; margin-bottom: 8px;
      text-transform: uppercase; color: #dfb76c; 
      background: linear-gradient(135deg, #dfb76c 0%, #f3e1b9 50%, #c39645 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 4px 15px rgba(223, 183, 108, 0.15));
    }
    @media (max-width: 400px) { h1 { font-size: 1.8rem; letter-spacing: 4px; } }

    .subtitulo-autor { font-size: 0.8rem; font-weight: 200; letter-spacing: 4px; color: #aaaaaa; margin-bottom: 40px; text-transform: uppercase; }
    .subtitulo-autor span { font-weight: 400; color: #dfb76c; }
    
    /* BOTÓN DORADO */
    .btn-oro {
      display: inline-block; padding: 14px 40px; font-size: 0.8rem; font-weight: 600; letter-spacing: 3px;
      color: #0a0a0a; text-decoration: none; text-transform: uppercase; border-radius: 4px;
      background: linear-gradient(135deg, #dfb76c 0%, #f9e7c4 100%);
      transition: all 0.4s ease; cursor: pointer; box-shadow: 0 4px 15px rgba(223, 183, 108, 0.3);
      border: none;
    }
    .btn-oro:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(223, 183, 108, 0.6); background: linear-gradient(135deg, #f9e7c4 0%, #dfb76c 100%); }
    
    /* PERFIL */
    .perfil-contenedor {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 10px;
    }
    .avatar-twitch {
      width: 85px; height: 85px; border-radius: 50%;
      border: 2px solid #dfb76c; margin-bottom: 15px;
      box-shadow: 0 0 25px rgba(223, 183, 108, 0.4);
      object-fit: cover; background-color: #121212;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .avatar-twitch.cargado { opacity: 1; }

    /* MARCADOR Y BARRA DE PROGRESO */
    .marcador-puntos { font-size: 0.8rem; letter-spacing: 2px; color: #f3e1b9; margin-top: 8px; font-weight: 600; text-transform: uppercase; }
    .marcador-puntos span { color: #ffffff; font-weight: 800; text-shadow: 0 0 10px rgba(223, 183, 108, 0.5); }

    .barra-contenedor {
      width: 80%; max-width: 320px; height: 16px; background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(223, 183, 108, 0.3); border-radius: 10px; margin: 10px auto 5px auto;
      overflow: hidden; padding: 2px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.7);
    }
    .barra-progreso {
      height: 100%; width: 0%; 
      background: linear-gradient(90deg, #ffd700, #fff6a3, #ffffff);
      border-radius: 8px; box-shadow: 0 0 12px rgba(255, 235, 59, 0.5);
      position: relative; overflow: hidden; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .barra-progreso::after {
      content: ''; position: absolute; top: 0; left: -150px; bottom: 0; width: 100px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 30%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 70%, rgba(255,255,255,0) 100%);
      transform: skewX(-30deg); animation: brilloBarra 2s infinite linear;
    }
    @keyframes brilloBarra { 0% { left: -150px; } 100% { left: 130%; } }

    /* MENÚS */
    .menu-titulo {
      font-size: 1.6rem; font-weight: 800; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 40%, #b3b3b3 100%); 
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
      filter: drop-shadow(0px 2px 5px rgba(255, 255, 255, 0.1));
    }
    .menu-linea { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #dfb76c, transparent); margin: 15px auto 30px auto; }
    
    /* BOTONES */
    .fila-opciones { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    @media (min-width: 480px) { .fila-opciones { flex-direction: row; flex-wrap: wrap; justify-content: center; } }

    .btn-opcion {
      width: 100%; padding: 15px 10px; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
      color: #dddddd; background: rgba(20, 19, 17, 0.7); border: 1px solid rgba(223, 183, 108, 0.2); 
      border-radius: 6px; text-transform: uppercase; cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @media (min-width: 480px) { .btn-opcion { flex: 1 1 200px; width: auto; } }
    .btn-opcion:hover { 
      color: #dfb76c; border-color: #dfb76c; background: rgba(223, 183, 108, 0.08); 
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(223, 183, 108, 0.15); 
    }
    
    /* CERRAR SESIÓN FLOTANTE */
    .btn-logout {
      position: absolute; top: 20px; left: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; color: #8c8c8c;
      background: transparent; border: none; text-transform: uppercase; cursor: pointer; transition: opacity 0.5s ease, color 0.3s ease; z-index: 10; opacity: 0; pointer-events: none;
    }
    .btn-logout.visible { opacity: 1; pointer-events: auto; }
    .btn-logout:hover { color: #dfb76c; text-shadow: 0 0 10px rgba(223, 183, 108, 0.5); }
    
    /* MODAL */
    .modal-fondo {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85);
      display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
      backdrop-filter: blur(5px);
    }
    .modal-fondo.activo { opacity: 1; pointer-events: auto; }
    .modal-caja { background: #0a0a0a; border: 1px solid #dfb76c; padding: 35px 30px; border-radius: 8px; text-align: center; max-width: 400px; width: 85%; box-shadow: 0 15px 40px rgba(223, 183, 108, 0.2); }
    .modal-txt { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; color: #ffffff; }
    .modal-botones { display: flex; justify-content: center; gap: 15px; }
    
    /* LIVES DINÁMICOS Y TEXTOS DE CARGA */
    .lista-lives { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; text-align: left; max-height: 250px; overflow-y: auto; padding-right: 5px; }
    .tarjeta-live { background: rgba(20, 19, 17, 0.8); padding: 15px; border-radius: 6px; border: 1px solid rgba(223, 183, 108, 0.2); border-left: 4px solid #dfb76c; display: flex; justify-content: space-between; align-items: center; }
    .msg-vacio { font-size: 0.9rem; color: #aaaaaa; letter-spacing: 2px; text-transform: uppercase; margin: 35px 0; font-style: italic; font-weight: 400; text-align: center; }
  </style>
</head>
<body>

  <canvas id="canvasRayos"></canvas>

  <button id="botonCerrarSesion" class="btn-logout" onclick="abrirAdvertencia()">Cerrar Sesión</button>

  <div id="pantallaInicio" class="pantalla">
    <h1>RXG INDOMINUS</h1>
    <div class="subtitulo-autor">Creado por: <span>AresRK</span></div>
    <a id="btnLogin" class="btn-oro" href="#" onclick="abrirAutorizacionDev(event)">Iniciar Sesión</a>
  </div>

  <div id="pantallaMenu" class="pantalla oculto">
    <div class="perfil-contenedor">
      <img id="userAvatar" class="avatar-twitch" src="" alt="Perfil">
      <div id="menuTitulo" class="menu-titulo">Cargando datos...</div>
      
      <div class="marcador-puntos">Puntos: <span id="contadorPuntos">0</span> / 100</div>
      <div class="barra-contenedor">
        <div id="barraProgreso" class="barra-progreso"></div>
      </div>
    </div>
    <div class="menu-linea"></div>
    
    <div class="fila-opciones">
      <button class="btn-opcion" onclick="cargarSeccion('ranking')">Ranking</button>
      <button class="btn-opcion" onclick="abrirPantallaLives()">Lives</button>
      <button class="btn-opcion" onclick="abrirPantallaAgenda()">Agenda</button>
      <button class="btn-opcion" onclick="cargarSeccion('comunidad')">Comunidad</button>
      <button class="btn-opcion" onclick="cargarSeccion('soporte')">Soporte</button>
    </div>
  </div>

  <div id="pantallaLives" class="pantalla oculto">
    <div class="menu-titulo" style="font-size: 1.4rem;">Transmisiones Activas</div>
    <div class="menu-linea" style="margin-bottom: 15px;"></div>
    <p style="font-size: 0.75rem; color: #aaa; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase;">Apoya a los streamers agendados en este bloque horario:</p>
    
    <div id="contenedorListaLives" class="lista-lives"></div>
    
    <div class="menu-linea" style="margin-top: 25px; margin-bottom: 15px;"></div>
    <button class="btn-opcion" onclick="volverAlMenuDesdeLives()">Volver al Panel</button>
  </div>

  <div id="pantallaAgenda" class="pantalla oculto">
    <div class="menu-titulo" style="font-size: 1.4rem;">Agenda Semanal</div>
    <div class="menu-linea" style="margin-bottom: 15px;"></div>
    <p style="font-size: 0.75rem; color: #aaa; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase;">Selecciona un día (Horarios adaptados a tu reloj local):</p>
    
    <select id="agendaDiaSelect" class="btn-opcion" style="width: 100%; margin-bottom: 20px; text-align: center; text-align-last: center;" onchange="renderizarHorasAgenda()">
      <option value="Lunes">Lunes</option>
      <option value="Martes">Martes</option>
      <option value="Miércoles">Miércoles</option>
      <option value="Jueves">Jueves</option>
      <option value="Viernes">Viernes</option>
      <option value="Sábado">Sábado</option>
    </select>

    <div id="contenedorListaAgenda" class="lista-lives" style="max-height: 280px;"></div>
    
    <div class="menu-linea" style="margin-top: 25px; margin-bottom: 15px;"></div>
    <button class="btn-opcion" onclick="volverAlMenuDesdeAgenda()">Volver al Panel</button>
  </div>

  <div id="miModal" class="modal-fondo">
    <div class="modal-caja">
      <div class="modal-txt">¿Estás seguro?</div>
      <div class="modal-botones">
        <button class="btn-opcion" onclick="confirmarCerrarSesion()">Aceptar</button>
        <button class="btn-opcion" onclick="cerrarAdvertencia()">Regresar</button>
      </div>
    </div>
  </div>

  <script>
    const CLIENT_ID = 'hjf8kkt3r3qa6bdgvntkq7nga59fab'; 
    const REDIRECT_URI = 'https://aresrk.github.io/RXG-INDOMINUS-/'; 
    const SCOPES = 'moderator:read:chatters user:read:chat';
    const URL_GOOGLE_SCRIPT = 'https://script.google.com/macros/s/AKfycbx8Qp0pmzT5lrqjl-mOTXaMIHiEL6jxlFbEUKS3OcoJu7-C8NelthjNqzqTnRhdwFR6/exec';

    let canalSeleccionado = null; 
    let usuariosQueChatearonEsteMinuto = []; 
    let websocketChat = null;
    let miUsuarioId = ""; 
    let miNombreTwitch = "";
    let datosAgendaGlobal = {};

    // ==========================================
    // MOTOR DE RAYOS EN CANVAS
    // ==========================================
    const canvas = document.getElementById('canvasRayos');
    const ctx = canvas.getContext('2d');

    function ajustarCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', ajustarCanvas);
    ajustarCanvas();

    function crearRayo(x1, y1, x2, y2, ramas) {
      let puntos = []; let x = x1; let y = y1;
      puntos.push({x: x, y: y});
      let pasos = 25; 
      let dx = (x2 - x1) / pasos; 
      let dy = (y2 - y1) / pasos;
      
      for (let i = 1; i < pasos; i++) {
        x += dx + (Math.random() - 0.5) * 80; 
        y += dy + (Math.random() - 0.5) * 20; 
        puntos.push({x: x, y: y});
        
        if (ramas && Math.random() < 0.25) {
          crearRayo(x, y, x + (Math.random() - 0.5) * 200, y + (Math.random() * 120), false);
        }
      }
      puntos.push({x: x2, y: y2});

      ctx.beginPath(); ctx.moveTo(puntos[0].x, puntos[0].y);
      for (let i = 1; i < puntos.length; i++) ctx.lineTo(puntos[i].x, puntos[i].y);
      ctx.strokeStyle = 'rgba(255, 220, 50, 0.8)'; ctx.lineWidth = ramas ? 3 : 1.5;
      ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 25; ctx.stroke();

      ctx.beginPath(); ctx.moveTo(puntos[0].x, puntos[0].y);
      for (let i = 1; i < puntos.length; i++) ctx.lineTo(puntos[i].x, puntos[i].y);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = ramas ? 1.2 : 0.6;
      ctx.shadowBlur = 0; ctx.stroke();
    }

    function bucleTormenta() {
      ctx.fillStyle = 'rgba(3, 3, 3, 0.45)'; 
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (Math.random() < 0.15) { 
        let xInicio = Math.random() * canvas.width;
        let xDestino = xInicio + (Math.random() - 0.5) * (canvas.width * 1.8);
        crearRayo(xInicio, 0, xDestino, canvas.height, true);
      }
      requestAnimationFrame(bucleTormenta);
    }
    bucleTormenta();

    // ==========================================
    // SISTEMA DE LOGUEO Y AUTORREGISTRO
    // ==========================================
    window.onload = function() {
      let accessToken = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
        accessToken = hashParams.get('access_token');
      } 
      if (!accessToken) {
        const urlParams = new URLSearchParams(window.location.search);
        accessToken = urlParams.get('access_token');
      }
      if (accessToken) {
        ejecutarTransicionMenu();
        obtenerDatosUsuario(accessToken);
      }
    };

    function abrirAutorizacionDev(event) {
      event.preventDefault();
      window.location.href = 'https://id.twitch.tv/oauth2/authorize' +
                            '?client_id=' + CLIENT_ID +
                            '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                            '&response_type=token' + 
                            '&scope=' + encodeURIComponent(SCOPES) +
                            '&force_verify=true' +
                            '&lang=es'; 
    }

    function obtenerDatosUsuario(token) {
      fetch('https://api.twitch.tv/helix/users', {
        method: 'GET',
        headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + token }
      })
      .then(response => response.json())
      .then(resultado => {
        if (resultado.data && resultado.data.length > 0) {
          const usuario = resultado.data[0];
          miUsuarioId = usuario.id;
          miNombreTwitch = usuario.login;
          
          document.getElementById('menuTitulo').innerText = "Hola " + usuario.display_name;
          const avatarImg = document.getElementById('userAvatar');
          avatarImg.src = usuario.profile_image_url;
          avatarImg.classList.add('cargado');
          window.history.replaceState({}, document.title, window.location.pathname);
          
          fetch(URL_GOOGLE_SCRIPT, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ accion: "registrar_streamer", usuario: miNombreTwitch })
          });

          actualizarBarraPuntos(usuario.login);
          canalSeleccionado = usuario.login;
          conectarEscuchaChat(usuario.login);
          
          setInterval(ejecutarPasoDeAsistenciaMinutario, 60000);
        }
      })
      .catch(error => { 
        console.error(error);
        document.getElementById('menuTitulo').innerText = "Panel General";
      });
    }

    function actualizarBarraPuntos(nombreUsuario) {
      fetch(`${URL_GOOGLE_SCRIPT}?usuario=${encodeURIComponent(nombreUsuario)}`)
      .then(res => res.json())
      .then(datos => {
        if (datos && typeof datos.puntos !== 'undefined') {
          let puntosVal = parseInt(datos.puntos) || 0;
          let porcentaje = puntosVal > 100 ? 100 : puntosVal;
          document.getElementById('contadorPuntos').innerText = puntosVal;
          document.getElementById('barraProgreso').style.width = porcentaje + '%';
        }
      })
      .catch(err => console.error("Error al obtener puntos:", err));
    }

    function conectarEscuchaChat(canal) {
      if(websocketChat) websocketChat.close();
      websocketChat = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
      websocketChat.onopen = () => {
        websocketChat.send('PASS oauth:justinfan12345');
        websocketChat.send('NICK justinfan12345');
        websocketChat.send('JOIN #' + canal.toLowerCase());
      };
      websocketChat.onmessage = (e) => {
        if(e.data.includes('PRIVMSG')) {
          let user = e.data.split('!')[0].substring(1).toLowerCase();
          if(user === miNombreTwitch.toLowerCase() && !usuariosQueChatearonEsteMinuto.includes(user)) {
            usuariosQueChatearonEsteMinuto.push(user);
          }
        }
      };
    }

    function ejecutarPasoDeAsistenciaMinutario() {
      if(!miNombreTwitch || !canalSeleccionado) return;
      let chatteo = usuariosQueChatearonEsteMinuto.includes(miNombreTwitch.toLowerCase()) ? [miNombreTwitch] : [];
      
      fetch(URL_GOOGLE_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ usuarios: [miNombreTwitch], usuariosQueChatearon: chatteo })
      }).then(() => {
        setTimeout(() => { actualizarBarraPuntos(miNombreTwitch); }, 2500);
      });
      usuariosQueChatearonEsteMinuto = [];
    }

    function ejecutarTransicionMenu() {
      document.getElementById('pantallaInicio').classList.add('oculto');
      document.getElementById('pantallaMenu').style.visibility = 'visible';
      setTimeout(function() {
        document.getElementById('pantallaMenu').classList.remove('oculto');
        document.getElementById('botonCerrarSesion').classList.add('visible');
      }, 400);
    }

    // ==========================================
    // SISTEMA DE CONVERSIÓN DE ZONA HORARIA AUTOMÁTICA
    // ==========================================
    function obtenerDiferenciaHorariaMX() {
      try {
        const mxStr = new Date().toLocaleString("en-US", { timeZone: "America/Mexico_City" });
        const mxDate = new Date(mxStr);
        const localDate = new Date();
        return Math.round((localDate.getTime() - mxDate.getTime()) / 3600000);
      } catch (e) {
        return 0; 
      }
    }

    // ==========================================
    // SECCIÓN AGENDA Semanal
    // ==========================================
    function abrirPantallaAgenda() {
      document.getElementById('pantallaMenu').classList.add('oculto');
      document.getElementById('contenedorListaAgenda').innerHTML = '<div style="color:#dfb76c; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px; text-align:center; margin:35px 0; font-style:italic; font-weight:400;">Sincronizando reloj...</div>';
      
      fetch(`${URL_GOOGLE_SCRIPT}?accion=obtener_agenda`)
      .then(res => res.json())
      .then(data => {
        datosAgendaGlobal = data;
        renderizarHorasAgenda();
        setTimeout(function() {
          document.getElementById('pantallaAgenda').style.visibility = 'visible';
          document.getElementById('pantallaAgenda').classList.remove('oculto');
        }, 400);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('contenedorListaAgenda').innerHTML = '<div class="msg-vacio">Error de conexión con la agenda</div>';
      });
    }

    function renderizarHorasAgenda() {
      const dia = document.getElementById('agendaDiaSelect').value;
      const contenedor = document.getElementById('contenedorListaAgenda');
      contenedor.innerHTML = '';
      
      const diff = obtenerDiferenciaHorariaMX();
      const bloqueDia = datosAgendaGlobal[dia] || {};
      
      for (let hMX = 9; hMX <= 23; hMX++) {
        const cupos = bloqueDia[hMX] || ["", "", ""];
        const ocupados = cupos.filter(c => c !== "").length;
        
        let hLocal = (hMX + diff + 24) % 24;
        let ampm = hLocal >= 12 ? 'PM' : 'AM';
        let h12 = hLocal % 12;
        if (h12 === 0) h12 = 12;
        let horaFormateada = (h12 < 10 ? '0' : '') + h12 + ':00 ' + ampm;
        
        const yaAgendadoYo = cupos.map(c => c.toLowerCase()).includes(miNombreTwitch.toLowerCase());
        
        let btnTexto = yaAgendadoYo ? "CANCELAR" : (ocupados >= 3 ? "LLENO" : "AGENDAR");
        let btnDeshabilitado = (!yaAgendadoYo && ocupados >= 3) ? "disabled style='opacity:0.4; cursor:not-allowed;'" : "";
        let nombresTxt = cupos.filter(c => c !== "").join(", ") || "Disponible";
        
        let html = `
        <div class="tarjeta-live" style="flex-direction: column; align-items: flex-start; gap: 6px; padding: 12px 15px;">
          <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <strong style="color:#fff; letter-spacing:1px; font-size:0.85rem;">${horaFormateada}</strong>
            <span style="font-size:0.7rem; color:#dfb76c; font-weight:600;">${ocupados}/3 CUPOS</span>
          </div>
          <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 2px;">
            <span style="font-size:0.75rem; color:#aaa; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">👤 ${nombresTxt}</span>
            <button class="btn-oro" style="padding:6px 12px; font-size:0.6rem; min-width:85px; text-align:center;" ${btnDeshabilitado} onclick="alternarCupoAgenda('${dia}', ${hMX}, ${yaAgendadoYo})">${btnTexto}</button>
          </div>
        </div>
        `;
        contenedor.innerHTML += html;
      }
    }

    function alternarCupoAgenda(dia, horaMX, cancelar) {
      if (!miNombreTwitch) return;
      const accion = cancelar ? "cancelar_agenda" : "agendar";
      
      document.getElementById('contenedorListaAgenda').innerHTML = '<div style="color:#dfb76c; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px; text-align:center; margin:35px 0; font-style:italic; font-weight:400;">Guardando espacio...</div>';
      
      fetch(URL_GOOGLE_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ accion: accion, usuario: miNombreTwitch, dia: dia, horaMX: horaMX })
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === "success" || res.status === "cancelled") {
          abrirPantallaAgenda();
        } else {
          alert(res.message || "Error al procesar el cupo.");
          abrirPantallaAgenda();
        }
      })
      .catch(err => {
        console.error(err);
        abrirPantallaAgenda();
      });
    }

    function volverAlMenuDesdeAgenda() {
      document.getElementById('pantallaAgenda').classList.add('oculto');
      setTimeout(function() {
        document.getElementById('pantallaMenu').style.visibility = 'visible';
        document.getElementById('pantallaMenu').classList.remove('oculto');
      }, 400);
    }

    // ==========================================
    // SECCIÓN LIVES (CONECTADO A LA AGENDA AUTOMÁTICA)
    // ==========================================
    function abrirPantallaLives() {
      document.getElementById('pantallaMenu').classList.add('oculto');
      cargarLives(); 
      setTimeout(function() {
        document.getElementById('pantallaLives').style.visibility = 'visible';
        document.getElementById('pantallaLives').classList.remove('oculto');
      }, 400);
    }

    function cargarLives() {
      const contenedor = document.getElementById('contenedorListaLives');
      contenedor.innerHTML = '<div style="color:#dfb76c; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px; text-align:center; margin:35px 0; font-style:italic; font-weight:400;">Buscando transmisión actual...</div>';

      fetch(`${URL_GOOGLE_SCRIPT}?accion=obtener_lives_actuales`)
      .then(res => res.json())
      .then(listaStreamers => {
        contenedor.innerHTML = ''; 
        if (!listaStreamers || listaStreamers.length === 0) {
          contenedor.innerHTML = '<div class="msg-vacio">Nadie agendado en este bloque</div>';
          return;
        }

        listaStreamers.forEach(streamer => {
          let html = `
          <div class="tarjeta-live">
            <div>
              <strong style="color:#fff; letter-spacing:1px; text-transform:uppercase; font-size:0.85rem;">${streamer}</strong><br>
              <span style="font-size:0.7rem; color:#dfb76c;">🟢 Horario Asignado Activo</span>
            </div>
            <button class="btn-oro" style="padding:8px 15px; font-size:0.65rem;" onclick="seleccionarCanal('${streamer.toLowerCase()}')">APOYAR</button>
          </div>
          `;
          contenedor.innerHTML += html;
        });
      })
      .catch(err => {
        console.error(err);
        contenedor.innerHTML = '<div class="msg-vacio">En espera de transmisiones</div>';
      });
    }

    function seleccionarCanal(canal) {
      canalSeleccionado = canal;
      alert(`¡Rastreador enlazado a ${canal.toUpperCase()}! Se abrirá su canal; mantén interactivo el chat para registrar tus puntos de forma continua.`);
      conectarEscuchaChat(canal); 
      window.open(`https://twitch.tv/${canal}`, '_blank'); 
      volverAlMenuDesdeLives();   
    }

    function volverAlMenuDesdeLives() {
      document.getElementById('pantallaLives').classList.add('oculto');
      setTimeout(function() {
        document.getElementById('pantallaMenu').style.visibility = 'visible';
        document.getElementById('pantallaMenu').classList.remove('oculto');
      }, 400);
    }

    // ==========================================
    // MODALES Y OTROS
    // ==========================================
    function abrirAdvertencia() { document.getElementById('miModal').classList.add('activo'); }
    function cerrarAdvertencia() { document.getElementById('miModal').classList.remove('activo'); }
    function confirmarCerrarSesion() { window.location.href = REDIRECT_URI; }
    function cargarSeccion(seccion) { alert(`La sección de ${seccion.toUpperCase()} estará disponible próximamente.`); }
  </script>
</body>
</html>
