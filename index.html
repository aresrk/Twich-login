<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RXG INDOMINUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; background-color: #030303; position: relative; }
    #canvasRayos { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
    .pantalla { text-align: center; position: absolute; width: 90%; max-width: 550px; padding: 35px 25px; background: rgba(10, 10, 10, 0.82); backdrop-filter: blur(12px); border: 1px solid rgba(223, 183, 108, 0.2); border-radius: 12px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65); transition: all 0.8s ease; z-index: 2; }
    .oculto { opacity: 0; transform: translateY(-30px) scale(0.95); pointer-events: none; visibility: hidden; }
    h1 { font-size: 2.4rem; font-weight: 600; letter-spacing: 8px; margin-bottom: 8px; text-transform: uppercase; color: #dfb76c; background: linear-gradient(135deg, #dfb76c 0%, #f3e1b9 50%, #c39645 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-oro { display: inline-block; padding: 14px 40px; font-size: 0.8rem; font-weight: 600; letter-spacing: 3px; color: #0a0a0a; text-decoration: none; text-transform: uppercase; border-radius: 4px; background: linear-gradient(135deg, #dfb76c 0%, #f9e7c4 100%); cursor: pointer; border: none; }
    .perfil-contenedor { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; width: 100%; }
    .avatar-twitch { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #dfb76c; margin-bottom: 15px; }
    .marcador-puntos { font-size: 0.85rem; letter-spacing: 2px; color: #f3e1b9; margin-top: 8px; font-weight: 600; text-transform: uppercase; }
    .barra-contenedor { width: 80%; max-width: 350px; height: 18px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(223, 183, 108, 0.35); border-radius: 10px; margin: 12px auto 5px auto; overflow: hidden; padding: 2px; }
    .barra-progreso { height: 100%; width: 0%; background: linear-gradient(90deg, #c49902, #ffd700, #fff4b8); border-radius: 8px; position: relative; overflow: hidden; transition: width 0.6s ease; }
    .barra-progreso::after { content: ''; position: absolute; top: 0; left: -150px; bottom: 0; width: 110px; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%); transform: skewX(-35deg); animation: brilloFeroz 1.8s infinite; }
    @keyframes brilloFeroz { 0% { left: -150px; } 100% { left: 120%; } }
    .fila-opciones { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .btn-opcion { width: 100%; padding: 15px 10px; font-size: 0.75rem; font-weight: 600; color: #dddddd; background: rgba(20, 19, 17, 0.7); border: 1px solid rgba(223, 183, 108, 0.2); border-radius: 6px; text-transform: uppercase; cursor: pointer; }
    .btn-opcion:hover { color: #dfb76c; border-color: #dfb76c; }
    .lista-lives { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; text-align: left; }
    .tarjeta-live { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border-left: 4px solid #dfb76c; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <canvas id="canvasRayos"></canvas>

  <!-- PANTALLA INICIO -->
  <div id="pantallaInicio" class="pantalla">
    <h1>RXG INDOMINUS</h1>
    <br><br>
    <a class="btn-oro" href="#" onclick="abrirAutorizacion(event)">Iniciar Sesión con Twitch</a>
  </div>

  <!-- PANTALLA MENÚ PRINCIPAL -->
  <div id="pantallaMenu" class="pantalla oculto">
    <div class="perfil-contenedor">
      <img id="userAvatar" class="avatar-twitch" src="">
      <div id="menuTitulo" style="font-size:1.5rem; color:#dfb76c;">Cargando...</div>
      <div class="marcador-puntos">Puntos: <span id="contadorPuntos">0</span> / 100</div>
      <div class="barra-contenedor"><div id="barraProgreso" class="barra-progreso"></div></div>
    </div>
    <br>
    <div class="fila-opciones">
      <button class="btn-opcion" onclick="mostrarSeccion('lives')">🔴 Ver Sección Lives</button>
      <button class="btn-opcion" onclick="alert('Próximamente')">Ranking / Recompensas</button>
    </div>
  </div>

  <!-- PANTALLA LIVES (SISTEMA DE ASISTENCIA MUTUA) -->
  <div id="pantallaLives" class="pantalla oculto">
    <h2 style="color:#dfb76c; letter-spacing:3px;">CANALES EN VIVO</h2>
    <p style="font-size:0.8rem; color:#aaa; margin-bottom:15px;">Selecciona a quién vas a apoyar para activar tu rastreador de puntos:</p>
    
    <div class="lista-lives">
      <!-- Aquí puedes añadir dinámicamente los streamers de tu grupo -->
      <div class="tarjeta-live">
        <div>
          <strong id="streamerNombre">Canal Principal</strong><br>
          <span style="font-size:0.75rem; color:#00ffcc;">● Listo para pasar asistencia</span>
        </div>
        <button class="btn-oro" style="padding:8px 15px; font-size:0.7rem;" onclick="activarRastreoEIrATwitch('AresRK')">APOYAR</button>
      </div>
    </div>
    <br>
    <button class="btn-opcion" onclick="mostrarSeccion('menu')">Volver al Menú</button>
  </div>

  <script>
    const CLIENT_ID = 'hjf8kkt3r3qa6bdgvntkq7nga59fab'; 
    const REDIRECT_URI = 'https://aresrk.github.io/RXG-INDOMINUS-/'; 
    const SCOPES = 'moderator:read:chatters user:read:chat';
    const URL_GOOGLE_SCRIPT = 'https://script.google.com/macros/s/AKfycbx8Qp0pmzT5lrqjl-mOTXaMIHiEL6jxlFbEUKS3OcoJu7-C8NelthjNqzqTnRhdwFR6/exec';

    let tokenActual = "";
    let miUsuarioId = "";
    let miNombreTwitch = "";
    let usuariosQueChatearonEsteMinuto = [];
    let websocketChat = null;

    // MOTOR DE RAYOS (ESTILO VISUAL)
    const canvas = document.getElementById('canvasRayos'); const ctx = canvas.getContext('2d');
    function ajustarCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', ajustarCanvas); ajustarCanvas();
    function crearRayo(x1, y1, x2, y2) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(255, 220, 50, 0.6)'; ctx.lineWidth = 2; ctx.stroke();
    }
    setInterval(() => { ctx.fillStyle = 'rgba(3, 3, 3, 0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height); if(Math.random()<0.04) crearRayo(Math.random()*canvas.width, 0, Math.random()*canvas.width, canvas.height); }, 50);

    // CONTROL DE PANTALLAS
    function mostrarSeccion(seccion) {
      document.getElementById('pantallaInicio').classList.add('oculto');
      document.getElementById('pantallaMenu').classList.add('oculto');
      document.getElementById('pantallaLives').classList.add('oculto');
      if(seccion === 'menu') document.getElementById('pantallaMenu').classList.remove('oculto');
      if(seccion === 'lives') document.getElementById('pantallaLives').classList.remove('oculto');
    }

    function abrirAutorizacion(e) {
      e.preventDefault();
      window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&force_verify=true`;
    }

    window.onload = function() {
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
      tokenActual = hashParams.get('access_token');
      if (tokenActual) {
        mostrarSeccion('menu');
        obtenerDatosUsuario();
      }
    };

    function obtenerDatosUsuario() {
      fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + tokenActual } })
      .then(r => r.json())
      .then(d => {
        const u = d.data[0];
        miUsuarioId = u.id;
        miNombreTwitch = u.login;
        document.getElementById('menuTitulo').innerText = "Hola " + u.display_name;
        document.getElementById('userAvatar').src = u.profile_image_url;
        
        // Conexión pasiva al chat propio para escuchar si alguien nos ayuda en nuestro canal
        conectarEscuchaChat(u.login);
        
        // Bucle de asistencia: Cada 1 minuto (60000 ms) pasa lista de quién está en nuestro chat
        setInterval(ejecutarPasoDeAsistenciaMinutario, 60000);
      });
    }

    // CONECTAR AL CHAT VÍA WEBSOCKET PARA CAPTURAR COMENTARIOS EN TIEMPO REAL
    function conectarEscuchaChat(canal) {
      if(websocketChat) websocketChat.close();
      websocketChat = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
      websocketChat.onopen = () => {
        websocketChat.send('PASS oauth:justinfan12345');
        websocketChat.send('NICK justinfan12345');
        websocketChat.send('JOIN #' + canal.toLowerCase());
      };
      websocketChat.onmessage = (e) => {
        if(e.data.includes('PRIVMSG')) {
          let usuario = e.data.split('!')[0].substring(1).toLowerCase();
          if(usuariosQueChatearonEsteMinuto.indexOf(usuario) === -1) {
            usuariosQueChatearonEsteMinuto.push(usuario); // Registramos que este usuario comentó
          }
        }
      };
    }

    // ACCIÓN DEL BOTÓN "APOYAR": Redirige al streamer y sintoniza el chat de ese streamer
    function activarRastreoEIrATwitch(nombreStreamer) {
      alert(`Activando rastreo para el canal de ${nombreStreamer}. Se abrirá Twitch en una pestaña nueva. ¡Mantén esta pestaña de la web abierta de fondo para no perder tus puntos!`);
      conectarEscuchaChat(nombreStreamer); // Tu web se pone a escuchar el chat del streamer al que apoyas
      window.open(`https://twitch.tv/${nombreStreamer}`, '_blank');
    }

    // EL PROCESO CLAVE: Cada 60 segundos envía la lista de quién está conectado y quién habló
    function ejecutarPasoDeAsistenciaMinutario() {
      if(!miNombreTwitch) return;
      
      // Consultamos la API de Twitch para ver la lista de espectadores actuales en nuestro chat
      fetch(`https://api.twitch.tv/helix/chat/chatters?broadcaster_id=${miUsuarioId}&moderator_id=${miUsuarioId}`, {
        headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + tokenActual }
      })
      .then(r => r.json())
      .then(data => {
        if(data && data.data) {
          const listaAsistencia = data.data.map(user => user.user_login);
          
          // Enviamos el reporte completo al cerebro
          fetch(URL_GOOGLE_SCRIPT, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              usuarios: listaAsistencia,
              usuariosQueChatearon: usuariosQueChatearonEsteMinuto,
              puntos: 0 // Las reglas de puntos se calculan directamente en la hoja
            })
          });
          
          console.log("Minuto evaluado. Espectadores:", listaAsistencia, "Chatearon:", usuariosQueChatearonEsteMinuto);
          // Reiniciamos la lista de chat para el próximo minuto
          usuariosQueChatearonEsteMinuto = [];
        }
      }).catch(err => console.log("Streamer no está en vivo o falta iniciar directo de apoyo."));
    }
  </script>
</body>
</html>
