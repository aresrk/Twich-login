<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RXG INDOMINUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      color: #ffffff; 
      min-height: 100vh;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      overflow: hidden;
      background-color: #0a0a0a;
      position: relative;
    }

    /* CANVAS DE RAYOS ORIGINAL ORIGINAL */
    #canvasRayos {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* PANTALLA CONTENEDORA BASE */
    .pantalla {
      text-align: center; 
      position: absolute; 
      width: 90%; 
      max-width: 500px; 
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 2;
    }
    
    .oculto { opacity: 0; transform: scale(0.9); pointer-events: none; }
    
    h1 {
      font-size: 2.2rem; font-weight: 600; letter-spacing: 6px; margin-bottom: 5px;
      text-transform: uppercase; color: #dfb76c;
    }
    @media (max-width: 400px) { h1 { font-size: 1.6rem; letter-spacing: 4px; } }

    .subtitulo-autor { font-size: 0.75rem; font-weight: 200; letter-spacing: 3px; color: #888888; margin-bottom: 35px; text-transform: uppercase; }
    .subtitulo-autor span { font-weight: 400; color: #dfb76c; }
    
    .btn-oro {
      display: inline-block; padding: 12px 35px; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
      color: #0a0a0a; text-decoration: none; text-transform: uppercase; border-radius: 4px;
      background: linear-gradient(135deg, #dfb76c 0%, #f9e7c4 100%);
      transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer;
      display: inline-block; border: none;
    }
    .btn-oro:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(223, 183, 108, 0.4); }
    
    /* INTERFAZ DE PERFIL */
    .perfil-contenedor { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
    .avatar-twitch { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #dfb76c; margin-bottom: 15px; background-color: #111; }

    /* EL DISEÑO DE LA BARRA DE PUNTOS RECUPERADO (AMARILLO ENERGÍA) */
    .marcador-puntos { font-size: 0.8rem; letter-spacing: 2px; color: #f3e1b9; margin-top: 8px; font-weight: 600; text-transform: uppercase; }
    .marcador-puntos span { color: #ffffff; font-weight: 800; text-shadow: 0 0 10px rgba(223, 183, 108, 0.5); }

    .barra-contenedor {
      width: 80%; max-width: 320px; height: 16px; background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(223, 183, 108, 0.3); border-radius: 10px; margin: 10px auto 5px auto;
      overflow: hidden; padding: 2px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.7);
    }
    .barra-progreso {
      height: 100%; width: 45%; /* Valor de muestra estable */
      background: linear-gradient(90deg, #ffd700, #fff6a3, #ffffff);
      border-radius: 8px; box-shadow: 0 0 12px rgba(255, 235, 59, 0.5);
      position: relative; overflow: hidden;
    }
    .barra-progreso::after {
      content: ''; position: absolute; top: 0; left: -150px; bottom: 0; width: 100px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 30%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 70%, rgba(255,255,255,0) 100%);
      transform: skewX(-30deg); animation: brilloBarra 2s infinite linear;
    }
    @keyframes brilloBarra { 0% { left: -150px; } 100% { left: 130%; } }

    .menu-titulo { font-size: 1.4rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #ffffff; }
    .menu-linea { width: 40px; height: 2px; background: #dfb76c; margin: 15px auto 25px auto; }
    
    /* BOTONES DEL PANEL */
    .fila-opciones { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn-opcion {
      width: 100%; padding: 12px; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
      color: #ffffff; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 4px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
    }
    .btn-opcion:hover { color: #dfb76c; border-color: #dfb76c; background: rgba(223, 183, 108, 0.05); }
    
    .btn-logout {
      position: absolute; top: 15px; left: 15px; font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; color: #666666;
      background: transparent; border: none; text-transform: uppercase; cursor: pointer; transition: color 0.2s ease; z-index: 10; display: none;
    }
    .btn-logout:hover { color: #dfb76c; }
    
    /* MODAL */
    .modal-fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; display: none; }
    .modal-caja { background: #0a0a0a; border: 1px solid #dfb76c; padding: 30px; border-radius: 6px; text-align: center; max-width: 350px; width: 90%; }
    .modal-txt { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    .modal-botones { display: flex; justify-content: center; gap: 10px; }

    /* INTEGRACIÓN DE LIVES */
    .lista-lives { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; text-align: left; }
    .tarjeta-live { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
    .msg-vacio { font-size: 0.85rem; color: #666; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0; }
  </style>
</head>
<body>

  <canvas id="canvasRayos"></canvas>

  <button id="botonCerrarSesion" class="btn-logout" onclick="abrirAdvertencia()">Cerrar Sesión</button>

  <div id="pantallaInicio" class="pantalla">
    <h1>RXG INDOMINUS</h1>
    <div class="subtitulo-autor">Creado por: <span>AresRK</span></div>
    <a id="btnLogin" class="btn-oro" href="#" onclick="abrirAutorizacionDev(event)">Iniciar Sesión</a>
  </div>

  <div id="pantallaMenu" class="pantalla oculto">
    <div class="perfil-contenedor">
      <img id="userAvatar" class="avatar-twitch" src="" alt="Avatar">
      <div id="menuTitulo" class="menu-titulo">Panel General</div>
      
      <div class="marcador-puntos">Puntos: <span id="contadorPuntos">45</span> / 100</div>
      <div class="barra-contenedor">
        <div id="barraProgreso" class="barra-progreso"></div>
      </div>
    </div>
    <div class="menu-linea"></div>
    <div class="fila-opciones">
      <button class="btn-opcion" onclick="cargarSeccion('ranking')">Ranking</button>
      <button class="btn-opcion" onclick="abrirPantallaLives()">Lives</button>
      <button class="btn-opcion" onclick="cargarSeccion('recompensas')">Recompensas</button>
      <button class="btn-opcion" onclick="cargarSeccion('comunidad')">Comunidad</button>
      <button class="btn-opcion" onclick="cargarSeccion('soporte')">Soporte</button>
    </div>
  </div>

  <div id="pantallaLives" class="pantalla oculto">
    <div class="menu-titulo" style="font-size: 1.2rem;">Transmisiones</div>
    <div class="menu-linea"></div>
    <div id="contenedorListaLives" class="lista-lives"></div>
    <div class="menu-linea" style="margin-top:20px;"></div>
    <button class="btn-opcion" onclick="volverAlMenuDesdeLives()">Volver</button>
  </div>

  <div id="miModal" class="modal-fondo">
    <div class="modal-caja">
      <div class="modal-txt">¿Cerrar sesión del sistema?</div>
      <div class="modal-botones">
        <button class="btn-opcion" style="width:auto; padding:8px 20px;" onclick="confirmarCerrarSesion()">Sí</button>
        <button class="btn-opcion" style="width:auto; padding:8px 20px;" onclick="cerrarAdvertencia()">No</button>
      </div>
    </div>
  </div>

  <script>
    const CLIENT_ID = 'hjf8kkt3r3qa6bdgvntkq7nga59fab'; 
    const REDIRECT_URI = 'https://aresrk.github.io/RXG-INDOMINUS-/'; 
    const SCOPES = 'moderator:read:chatters user:read:chat';
    const URL_GOOGLE_SCRIPT = 'https://script.google.com/macros/s/AKfycbx8Qp0pmzT5lrqjl-mOTXaMIHiEL6jxlFbEUKS3OcoJu7-C8NelthjNqzqTnRhdwFR6/exec';

    let usuariosQueChatearonEsteMinuto = []; 
    let websocketChat = null;
    let miUsuarioId = ""; 
    let miNombreTwitch = "";

    // ==========================================
    // SISTEMA DE RAYOS ORIGINAL (ESTABLE Y SEGURO)
    // ==========================================
    const canvas = document.getElementById('canvasRayos');
    const ctx = canvas.getContext('2d');
    let rayos = [];

    function ajustarCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', ajustarCanvas);
    ajustarCanvas();

    function crearRayoEfecto() {
      let xInicio = Math.random() * canvas.width;
      let puntos = [];
      let x = xInicio;
      let y = 0;
      
      while (y < canvas.height) {
        puntos.push({x: x, y: y});
        x += (Math.random() - 0.5) * 40;
        y += Math.random() * 40 + 10;
      }
      rayos.push({puntos: puntos, opacidad: 1.0});
    }

    function dibujarEfectos() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (Math.random() < 0.05) {
        crearRayoEfecto();
      }
      
      for (let i = rayos.length - 1; i >= 0; i--) {
        let r = rayos[i];
        ctx.beginPath();
        ctx.moveTo(r.puntos[0].x, r.puntos[0].y);
        for (let j = 1; j < r.puntos.length; j++) {
          ctx.lineTo(r.puntos[j].x, r.puntos[j].y);
        }
        ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacidad})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        r.opacidad -= 0.1;
        if (r.opacidad <= 0) {
          rayos.splice(i, 1);
        }
      }
      requestAnimationFrame(dibujarEfectos);
    }
    dibujarEfectos();

    // ==========================================
    // CONTROL DE FLUJO DE SESIÓN Y ASISTENCIA TWITCH
    // ==========================================
    window.onload = function() {
      let accessToken = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
        accessToken = hashParams.get('access_token');
      }
      if (!accessToken) {
        const urlParams = new URLSearchParams(window.location.search);
        accessToken = urlParams.get('access_token');
      }

      if (accessToken) {
        ejecutarTransicionMenu();
        obtenerDatosUsuario(accessToken);
      }
    };

    function abrirAutorizacionDev(event) {
      event.preventDefault();
      var urlSegura = 'https://id.twitch.tv/oauth2/authorize' +
                      '?client_id=' + CLIENT_ID +
                      '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                      '&response_type=token' + 
                      '&scope=' + encodeURIComponent(SCOPES) +
                      '&force_verify=true' +
                      '&lang=es';
      window.location.href = urlSegura;
    }

    function obtenerDatosUsuario(token) {
      fetch('https://api.twitch.tv/helix/users', {
        method: 'GET',
        headers: {
          'Client-ID': CLIENT_ID,
          'Authorization': 'Bearer ' + token
        }
      })
      .then(response => response.json())
      .then(resultado => {
        if (resultado.data && resultado.data.length > 0) {
          const usuario = resultado.data[0];
          miUsuarioId = usuario.id;
          miNombreTwitch = usuario.login;
          
          document.getElementById('menuTitulo').innerText = usuario.display_name;
          document.getElementById('userAvatar').src = usuario.profile_image_url;
          window.history.replaceState({}, document.title, window.location.pathname);
          
          conectarEscuchaChat(usuario.login);
          setInterval(ejecutarPasoDeAsistenciaMinutario, 60000);
        }
      })
      .catch(error => {
        console.error(error);
        document.getElementById('menuTitulo').innerText = "Panel Control";
      });
    }

    function conectarEscuchaChat(canal) {
      if(websocketChat) websocketChat.close();
      websocketChat = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
      websocketChat.onopen = () => {
        websocketChat.send('PASS oauth:justinfan12345');
        websocketChat.send('NICK justinfan12345');
        websocketChat.send('JOIN #' + canal.toLowerCase());
      };
      websocketChat.onmessage = (e) => {
        if(e.data.includes('PRIVMSG')) {
          let user = e.data.split('!')[0].substring(1).toLowerCase();
          if(usuariosQueChatearonEsteMinuto.indexOf(user) === -1) {
            usuariosQueChatearonEsteMinuto.push(user);
          }
        }
      };
    }

    function ejecutarPasoDeAsistenciaMinutario() {
      if(!miNombreTwitch || !miUsuarioId) return;
      
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
      let token = hashParams.get('access_token') || new URLSearchParams(window.location.search).get('access_token');
      
      fetch(`https://api.twitch.tv/helix/chat/chatters?broadcaster_id=${miUsuarioId}&moderator_id=${miUsuarioId}`, {
        headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(data => {
        if(data && data.data) {
          const listaAsistencia = data.data.map(user => user.user_login);
          
          fetch(URL_GOOGLE_SCRIPT, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              usuarios: listaAsistencia, 
              usuariosQueChatearon: usuariosQueChatearonEsteMinuto 
            })
          });
          usuariosQueChatearonEsteMinuto = [];
        }
      })
      .catch(err => console.error(err));
    }

    function ejecutarTransicionMenu() {
      document.getElementById('pantallaInicio').classList.add('oculto');
      setTimeout(function() {
        document.getElementById('pantallaMenu').classList.remove('oculto');
        document.getElementById('botonCerrarSesion').style.display = 'block';
      }, 400);
    }

    function abrirPantallaLives() {
      document.getElementById('pantallaMenu').classList.add('oculto');
      setTimeout(function() {
        document.getElementById('pantallaLives').classList.remove('oculto');
      }, 400);

      const contenedor = document.getElementById('contenedorListaLives');
      contenedor.innerHTML = '<div style="color:#dfb76c; font-size:0.8rem; text-transform:uppercase; text-align:center;">Buscando transmisiones...</div>';
      
      fetch(URL_GOOGLE_SCRIPT)
      .then(r => r.json())
      .then(canalesActivos => {
        contenedor.innerHTML = "";
        if(!canalesActivos || canalesActivos.length === 0) {
          contenedor.innerHTML = '<div class="msg-vacio">En espera de transmisiones</div>';
        } else {
          canalesActivos.forEach(canal => {
            contenedor.innerHTML += `
              <div class="tarjeta-live">
                <div>
                  <strong style="color:#fff; font-size:0.8rem;">${canal.streamer}</strong><br>
                  <span style="font-size:0.65rem; color:#dfb76c;">Agenda Activa</span>
                </div>
                <button class="btn-oro" style="padding:6px 12px; font-size:0.65rem;" onclick="enlazarApoyoStreamer('${canal.streamer}')">APOYAR</button>
              </div>`;
          });
        }
      })
      .catch(() => {
        contenedor.innerHTML = '<div class="msg-vacio">En espera de transmisiones</div>';
      });
    }

    function enlazarApoyoStreamer(streamer) {
      alert(`Conectando rastreador a: ${streamer}`);
      conectarEscuchaChat(streamer);
      window.open(`https://twitch.tv/${streamer}`, '_blank');
    }

    function volverAlMenuDesdeLives() {
      document.getElementById('pantallaLives').classList.add('oculto');
      setTimeout(function() {
        document.getElementById('pantallaMenu').classList.remove('oculto');
      }, 400);
    }

    function abrirAdvertencia() { document.getElementById('miModal').style.display = 'flex'; }
    function cerrarAdvertencia() { document.getElementById('miModal').style.display = 'none'; }
    function confirmarCerrarSesion() { window.location.href = REDIRECT_URI; }
    function cargarSeccion(nombre) { alert("Cargando: " + nombre); }
  </script>
</body>
</html>
