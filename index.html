<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RXG INDOMINUS</title>
  <link href="https://googleapis.com" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a; color: #ffffff; min-height: 100vh;
      display: flex; justify-content: center; align-items: center; overflow-x: hidden;
    }
    .pantalla {
      text-align: center; position: absolute; width: 100%; max-width: 600px; padding: 24px;
      transition: all 0.8s ease-in-out;
    }
    .oculto { opacity: 0; transform: translateY(-30px); pointer-events: none; visibility: hidden; }
    
    /* TÍTULO RESPONSIVO */
    h1 {
      font-size: 8vw; font-weight: 600; letter-spacing: 6px; margin-bottom: 5px;
      text-transform: uppercase; color: #dfb76c; text-shadow: 0px 4px 15px rgba(223, 183, 108, 0.2);
    }
    @media (min-width: 600px) { h1 { font-size: 3.2rem; letter-spacing: 10px; } }

    .subtitulo-autor { font-size: 0.85rem; font-weight: 200; letter-spacing: 4px; color: #cccccc; margin-bottom: 40px; text-transform: uppercase; }
    .subtitulo-autor span { font-weight: 400; color: #ffffff; }
    
    .btn-oro {
      display: inline-block; padding: 14px 45px; font-size: 0.85rem; font-weight: 400; letter-spacing: 3px;
      color: #dfb76c; text-decoration: none; text-transform: uppercase; border: 1px solid #dfb76c; border-radius: 2px;
      background: transparent; transition: all 0.4s ease; cursor: pointer; max-width: 100%;
    }
    .btn-oro:hover { background: #dfb76c; color: #0a0a0a; box-shadow: 0 0 30px rgba(223, 183, 108, 0.4); transform: translateY(-2px); }
    
    /* CONTENEDOR DE PERFIL DE TWITCH */
    .perfil-contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 15px;
      margin-top: 40px; /* Espacio para que no choque con el botón de salir en celular */
    }
    .avatar-twitch {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #dfb76c;
      margin-bottom: 10px;
      box-shadow: 0 0 20px rgba(223, 183, 108, 0.3);
      object-fit: cover;
      background-color: #121212;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .avatar-twitch.cargado { opacity: 1; }

    /* TEXTO DE MENÚ RESPONSIVO */
    .menu-titulo {
      font-size: 6vw; font-weight: 800; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 30%, #a6a6a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 10px rgba(255, 255, 255, 0.3));
    }
    @media (min-width: 600px) { .menu-titulo { font-size: 2.2rem; letter-spacing: 12px; } }

    .menu-linea { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, #dfb76c, transparent); margin: 20px auto 30px auto; }
    
    /* BOTONES ADAPTABLES A CELULAR */
    .fila-opciones { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 400px; margin: 0 auto; }
    @media (min-width: 450px) { .fila-opciones { flex-direction: row; flex-wrap: wrap; justify-content: center; max-width: 100%; } }

    .btn-opcion {
      width: 100%; padding: 16px 10px; font-size: 0.8rem; font-weight: 400; letter-spacing: 2px;
      color: #cccccc; background: #121212; border: 1px solid #262626; border-radius: 4px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @media (min-width: 450px) { .btn-opcion { flex: 1 1 180px; width: auto; } }
    .btn-opcion:hover { color: #dfb76c; border-color: #dfb76c; background: #161613; transform: scale(1.03); box-shadow: 0 5px 15px rgba(223, 183, 108, 0.08); }
    
    /* BOTÓN CERRAR SESIÓN FLOTANTE RESPONSIVO */
    .btn-logout {
      position: absolute; top: 20px; left: 20px; font-size: 0.75rem; font-weight: 400; letter-spacing: 2px; color: #8c8c8c;
      background: transparent; border: none; text-transform: uppercase; cursor: pointer; transition: opacity 0.5s ease, color 0.3s ease; z-index: 10; opacity: 0; pointer-events: none;
    }
    .btn-logout.visible { opacity: 1; pointer-events: auto; }
    .btn-logout:hover { color: #dfb76c; }
    
    /* MODAL */
    .modal-fondo {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8);
      display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .modal-fondo.activo { opacity: 1; pointer-events: auto; }
    .modal-caja { background: #0a0a0a; border: 1px solid #dfb76c; padding: 35px 30px; border-radius: 4px; text-align: center; max-width: 450px; width: 90%; box-shadow: 0 10px 40px rgba(223, 183, 108, 0.15); }
    .modal-txt { font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; color: #ffffff; }
    .modal-botones { display: flex; justify-content: center; gap: 15px; }
    .modal-botones .btn-opcion { flex: 1 1 140px; padding: 14px 10px; }
  </style>
</head>
<body>

  <button id="botonCerrarSesion" class="btn-logout" onclick="abrirAdvertencia()">Cerrar Sesión</button>

  <div id="pantallaInicio" class="pantalla">
    <h1>RXG INDOMINUS</h1>
    <div class="subtitulo-autor">Creado por: <span>AresRK</span></div>
    <a id="btnLogin" class="btn-oro" href="#" onclick="abrirAutorizacionDev(event)">Iniciar Sesión</a>
  </div>

  <div id="pantallaMenu" class="pantalla oculto">
    <div class="perfil-contenedor">
      <img id="userAvatar" class="avatar-twitch" src="" alt="Perfil">
      <div id="menuTitulo" class="menu-titulo">Cargando datos...</div>
    </div>
    <div class="menu-linea"></div>
    
    <div class="fila-opciones">
      <button class="btn-opcion" onclick="cargarSeccion('ranking')">Ranking</button>
      <button class="btn-opcion" onclick="cargarSeccion('lives')">Lives</button>
      <button class="btn-opcion" onclick="cargarSeccion('recompensas')">Recompensas</button>
      <button class="btn-opcion" onclick="cargarSeccion('comunidad')">Comunidad</button>
      <button class="btn-opcion" onclick="cargarSeccion('soporte')">Soporte</button>
    </div>
  </div>

  <div id="miModal" class="modal-fondo">
    <div class="modal-caja">
      <div class="modal-txt">¿Estás seguro?</div>
      <div class="modal-botones">
        <button class="btn-opcion" onclick="confirmarCerrarSesion()">Aceptar</button>
        <button class="btn-opcion" onclick="cerrarAdvertencia()">Regresar</button>
      </div>
    </div>
  </div>

  <script>
    const CLIENT_ID = 'hjf8kkt3r3qa6bdgvntkq7nga59fab'; 
    const REDIRECT_URI = 'https://aresrk.github.io/RXG-INDOMINUS-/'; 
    const SCOPES = 'moderator:read:chatters';

    window.onload = function() {
      let accessToken = null;
      
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
        accessToken = hashParams.get('access_token');
      } 
      
      if (!accessToken) {
        const urlParams = new URLSearchParams(window.location.search);
        accessToken = urlParams.get('access_token');
      }

      if (accessToken) {
        ejecutarTransicionMenu();
        obtenerDatosUsuario(accessToken);
      }
    };

    function abrirAutorizacionDev(event) {
      event.preventDefault();
      var urlSegura = 'https://id.twitch.tv/oauth2/authorize' +
                      '?client_id=' + CLIENT_ID +
                      '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                      '&response_type=token' + 
                      '&scope=' + encodeURIComponent(SCOPES) +
                      '&force_verify=true' +
                      '&lang=es'; 
      window.location.href = urlSegura;
    }

    function obtenerDatosUsuario(token) {
      fetch('https://api.twitch.tv/helix/users', {
        method: 'GET',
        headers: {
          'Client-ID': CLIENT_ID,
          'Authorization': 'Bearer ' + token
        }
      })
      .then(response => response.json())
      .then(resultado => {
        if (resultado.data && resultado.data.length > 0) {
          const usuario = resultado.data[0];
          
          // Corrección: Sin la coma
          document.getElementById('menuTitulo').innerText = "Hola " + usuario.display_name;
          
          const avatarImg = document.getElementById('userAvatar');
          avatarImg.src = usuario.profile_image_url;
          avatarImg.classList.add('cargado');
          
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      })
      .catch(error => { 
        console.error('Error al conectar con la API de Twitch:', error);
        document.getElementById('menuTitulo').innerText = "Panel General";
      });
    }

    function ejecutarTransicionMenu() {
      document.getElementById('pantallaInicio').classList.add('oculto');
      document.getElementById('pantallaMenu').style.visibility = 'visible';
      setTimeout(function() {
        document.getElementById('pantallaMenu').classList.remove('oculto');
        document.getElementById('botonCerrarSesion').classList.add('visible');
      }, 400);
    }

    function abrirAdvertencia() { document.getElementById('miModal').classList.add('activo'); }
    function cerrarAdvertencia() { document.getElementById('miModal').classList.remove('activo'); }
    function confirmarCerrarSesion() { window.location.href = REDIRECT_URI; }
    function cargarSeccion(nombre) { alert("Has entrado a la sección: " + nombre); }
  </script>
</body>
</html>
